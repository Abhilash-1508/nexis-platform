services:
  # ---------------------------------------------------------------------------
  # BACKEND SERVICE (Spring Boot + Docker)
  # ---------------------------------------------------------------------------
  - type: web
    name: nexis-backend
    env: docker
    rootDir: backend
    plan: free
    region: oregon
    envVars:
      - key: PORT
        value: 8080
      - key: DATASOURCE_USERS_URL
        value: jdbc:h2:file:./data/users;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      - key: DATASOURCE_PRODUCTS_URL
        value: jdbc:h2:file:./data/products;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      - key: FRONTEND_URL
        value: https://nexis-platform.vercel.app # Change this after Vercel deploy
      - key: OPENAI_API_KEY
        value: sk-placeholder

  # ---------------------------------------------------------------------------
  # FRONTEND SERVICE (Vercel is better, but this is a backup for Render)
  # ---------------------------------------------------------------------------
  - type: web
    name: nexis-frontend
    env: node
    rootDir: frontend
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: nexis-backend
          property: host
