spring:
  datasource:
    users:
      # Render ephemeral disk warning: H2 file databases will reset on redeploy.
      # For production, utilize a managed PostgreSQL service.
      url: ${DATASOURCE_USERS_URL:jdbc:h2:file:./data/users;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
      driver-class-name: org.h2.Driver
      username: ${DATASOURCE_USERS_USERNAME:sa}
      password: ${DATASOURCE_USERS_PASSWORD:}
      hikari:
        maximum-pool-size: 10
    products:
      url: ${DATASOURCE_PRODUCTS_URL:jdbc:h2:file:./data/products;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
      driver-class-name: org.h2.Driver
      username: ${DATASOURCE_PRODUCTS_USERNAME:sa}
      password: ${DATASOURCE_PRODUCTS_PASSWORD:}
      hikari:
        maximum-pool-size: 10
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    org.springframework.security: INFO
    com.recommerce: INFO

server:
  port: ${PORT:8080}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  messaging-service-sid: ${TWILIO_MESSAGING_SERVICE_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  phone-number: ${TWILIO_PHONE_NUMBER}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder_123}
  key-secret: ${RAZORPAY_KEY_SECRET:sec_test_placeholder_456}

admin:
  mobile-phone: ${ADMIN_MOBILE_PHONE:+911234567890}

openai:
  api-key: ${OPENAI_API_KEY}
  model: ${OPENAI_MODEL:gpt-3.5-turbo}
  url: ${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
